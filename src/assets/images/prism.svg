<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" style="background-color: #05050a; width: 100%; height: auto; overflow: hidden;">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="beamIncoming" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="80%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>

    <linearGradient id="beamRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff1144" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff1144" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff7700" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff7700" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamYellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffcc00" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffcc00" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ee55" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00ee55" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ddff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00ddff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2255ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2255ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamViolet" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#aa22ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#aa22ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamMagenta" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00aa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff00aa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g transform="translate(400, 400)">
    
    <circle cx="0" cy="0" r="150" fill="#ffffff" opacity="0.03" filter="url(#glow)" />

    <g filter="url(#glow)">
      <rect x="-500" y="-4" width="470" height="8" fill="url(#beamIncoming)" transform="rotate(165)">
         <animate attributeName="opacity" values="0.6; 1; 0.6" dur="3s" repeatCount="indefinite"/>
      </rect>
    </g>

    <g filter="url(#glow)" style="mix-blend-mode: screen;">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="24s" repeatCount="indefinite" />
      
      <rect x="40" y="-3" width="450" height="6" fill="url(#beamRed)" transform="rotate(0)" />
      <rect x="45" y="-2" width="400" height="4" fill="url(#beamOrange)" transform="rotate(51)" />
      <rect x="35" y="-4" width="420" height="8" fill="url(#beamYellow)" transform="rotate(102)" />
      <rect x="50" y="-2" width="380" height="4" fill="url(#beamGreen)" transform="rotate(154)" />
      <rect x="40" y="-3" width="460" height="6" fill="url(#beamCyan)" transform="rotate(205)" />
      <rect x="30" y="-5" width="480" height="10" fill="url(#beamBlue)" transform="rotate(257)" />
      <rect x="55" y="-2" width="350" height="4" fill="url(#beamViolet)" transform="rotate(308)" />
    </g>

    <g filter="url(#glow)" opacity="0.6" style="mix-blend-mode: screen;">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="16s" repeatCount="indefinite" />
      
      <rect x="60" y="-2" width="320" height="4" fill="url(#beamMagenta)" transform="rotate(25)" />
      <rect x="50" y="-3" width="360" height="6" fill="url(#beamCyan)" transform="rotate(85)" />
      <rect x="70" y="-2" width="280" height="4" fill="url(#beamYellow)" transform="rotate(145)" />
      <rect x="45" y="-1" width="390" height="2" fill="url(#beamRed)" transform="rotate(205)" />
      <rect x="55" y="-4" width="340" height="8" fill="url(#beamGreen)" transform="rotate(265)" />
      <rect x="65" y="-2" width="300" height="4" fill="url(#beamBlue)" transform="rotate(325)" />
    </g>

    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite" />
      
      <polygon points="0,-70 60.62,35 -60.62,35" fill="rgba(255, 255, 255, 0.05)" stroke="#ffffff" stroke-width="2" />
      
      <polygon points="0,-70 0,10 -60.62,35" fill="rgba(255, 255, 255, 0.15)" />
      <polygon points="0,-70 60.62,35 0,10" fill="rgba(255, 255, 255, 0.08)" />
      <polygon points="-60.62,35 60.62,35 0,10" fill="rgba(255, 255, 255, 0.2)" />
      
      <circle cx="0" cy="10" r="6" fill="#ffffff" filter="url(#glow)">
         <animate attributeName="opacity" values="0.5; 1; 0.5" dur="1.5s" repeatCount="indefinite"/>
      </circle>
    </g>

  </g>
</svg>
